    <title>Contact</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="../index.html">⌂</a></li>
          <li><a href="mijncv.html">Mijn CV</a></li>
          <li><a href="contact.html" style="background-color: rgb(130,100,30);">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <form action="https://formspree.io/f/mlgvyelv" method="POST">
        <h1>Contact Formulier</h1>

        <label for="naam">Naam:</label>
        <input type="text" name="naam" id="naam" maxlength="120">

        <label>Achternaam:</label>
        <input type="text" name="achternaam" id="achternaam" maxlength="120">

        <label>Email:</label>
        <input type="email" name="email" id="email" maxlength="120" required>

        <label for="bericht">Bericht:</label>
        <textarea name="bericht" id="bericht" maxlength="1500" placeholder="(Max. 1500 tokens)"></textarea>

        <button type="submit">Verzend</button>
      </form>
    </main>
    <footer>
      <p>© Lars van der Veen | <a href="../index.html">Persoonlijke pagina</a> | <a href="https://github.com/Lvdveen" target="_blank">Github pagina</a></p>
    </footer>
  </body>
</html>
